[distribution]
name = "code-agent"
version = "0.1.0"

[provider]
type = "anthropic"
model = "claude-sonnet-4-5"
api_key_env = "ANTHROPIC_API_KEY"
fallback = "echo"

[policy]
file = "../policies/permissive.yaml"

[[toolset]]
kind = "mcp.stdio"
id = "workspace"
[toolset.config]
command = "kernel-workspace-local"
args = []
root = "."

[frontend]
type = "tui"
